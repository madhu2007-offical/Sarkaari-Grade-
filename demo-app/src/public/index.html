<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sarkaari Shop — Demo App</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1>🏛️ Sarkaari Shop</h1>
    <nav>
      <a href="#products" role="link">Products</a>
      <a href="#cart" role="link">Cart</a>
      <a href="#contact" role="link">Contact</a>
    </nav>
  </header>

  <main>
    <section id="products" aria-label="Products">
      <h2>Products</h2>
      <div id="product-list" class="grid"></div>
    </section>

    <section id="cart" aria-label="Shopping Cart">
      <h2>Shopping Cart</h2>
      <ul id="cart-items" role="list"></ul>
      <p id="cart-total">Total: ₹0</p>
      <button id="checkout-btn" type="button" role="button" aria-label="Checkout">
        Checkout
      </button>
      <div id="checkout-error" role="alert" hidden></div>
      <div id="checkout-success" role="status" hidden></div>
    </section>

    <section id="contact" aria-label="Contact Form">
      <h2>Contact Us</h2>
      <form id="contact-form" role="form" aria-label="Contact form">
        <label>
          Name <span aria-label="required">*</span>
          <input id="contact-name" name="name" type="text" aria-required="true" />
        </label>
        <label>
          Email
          <input id="contact-email" name="email" type="email" />
        </label>
        <label>
          Message
          <textarea id="contact-message" name="message"></textarea>
        </label>
        <button type="submit" role="button" aria-label="Submit contact form">Submit</button>
        <div id="contact-status" role="status" hidden></div>
      </form>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
